<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小番茄闹钟</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #fff;
  user-select: none;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
.container { width: 400px; padding: 24px; }

/* 模式标签 */
.mode-tabs { display: flex; gap: 8px; margin-bottom: 24px; justify-content: center; }
.mode-tab {
  padding: 6px 20px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
  background: transparent; color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer;
  transition: all 0.2s;
}
.mode-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
.mode-tab.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.4); }
.mode-tab[data-mode="work"].active { background: rgba(231,76,60,0.3); border-color: rgba(231,76,60,0.6); }
.mode-tab[data-mode="shortBreak"].active { background: rgba(46,204,113,0.3); border-color: rgba(46,204,113,0.6); }
.mode-tab[data-mode="longBreak"].active { background: rgba(52,152,219,0.3); border-color: rgba(52,152,219,0.6); }

/* 计时器 */
.timer-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
.progress-ring-container {
  position: relative; width: 200px; height: 200px; display: flex;
  align-items: center; justify-content: center; cursor: pointer;
}
.progress-ring { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
.progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
.progress-ring-fill {
  fill: none; stroke: #e74c3c; stroke-width: 5; stroke-linecap: round;
  stroke-dasharray: 565.49; stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear, stroke 0.3s;
}
.progress-ring-fill.break-short { stroke: #2ecc71; }
.progress-ring-fill.break-long { stroke: #3498db; }
.timer-display { font-size: 44px; font-weight: 200; letter-spacing: 3px; font-variant-numeric: tabular-nums; pointer-events: none; }
.edit-hint {
  position: absolute; bottom: -18px; font-size: 11px; color: rgba(255,255,255,0.35);
  white-space: nowrap; opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.progress-ring-container:hover .edit-hint { opacity: 0.7; }
.cycle-info { margin-top: 12px; font-size: 13px; opacity: 0.5; }

/* 控制按钮 */
.controls { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
.btn {
  padding: 8px 20px; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
  background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { background: rgba(255,255,255,0.15); }
.btn:active { transform: scale(0.96); }
.btn-start { background: rgba(231,76,60,0.3); border-color: rgba(231,76,60,0.5); min-width: 80px; }
.btn-start:hover { background: rgba(231,76,60,0.45); }
.btn-pause { background: rgba(241,196,15,0.3); border-color: rgba(241,196,15,0.5); min-width: 80px; }
.btn-pause:hover { background: rgba(241,196,15,0.45); }
.hidden { display: none !important; }

/* 统计 */
.stats {
  display: flex; gap: 16px; justify-content: center; margin-bottom: 12px;
  padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px;
}
.stat-item { display: flex; flex-direction: column; align-items: center; }
.stat-value { font-size: 20px; font-weight: 600; color: #e74c3c; }
.stat-label { font-size: 10px; opacity: 0.5; margin-top: 2px; }

/* 设置按钮 */
.btn-settings {
  display: block; width: 100%; padding: 6px; border: none; border-radius: 10px;
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5);
  font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.btn-settings:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }

/* 设置面板 */
.settings-panel {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10,10,30,0.95); border-radius: 16px; padding: 20px;
  z-index: 10; overflow-y: auto; animation: slideUp 0.25s ease;
  display: flex; justify-content: center; align-items: flex-start;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.settings-inner { width: 340px; margin-top: 60px; }
.settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.settings-header h3 { font-size: 18px; font-weight: 500; }
.settings-close {
  width: 32px; height: 32px; border: none; border-radius: 8px;
  background: rgba(255,255,255,0.1); color: #fff; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.settings-close:hover { background: rgba(255,255,255,0.2); }
.setting-group { margin-bottom: 16px; }
.setting-group label { display: block; font-size: 13px; opacity: 0.7; margin-bottom: 6px; }
.setting-group input[type="number"] {
  width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; background: rgba(255,255,255,0.06); color: #fff;
  font-size: 15px; outline: none; transition: border-color 0.2s;
}
.setting-group input[type="number"]:focus { border-color: rgba(231,76,60,0.6); }
.checkbox-label { display: flex !important; align-items: center; gap: 10px; cursor: pointer; font-size: 14px !important; opacity: 1 !important; }
.checkbox-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: #e74c3c; cursor: pointer; }
.btn-save {
  width: 100%; padding: 12px; border: none; border-radius: 10px;
  background: rgba(231,76,60,0.4); color: #fff; font-size: 15px;
  font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.2s;
}
.btn-save:hover { background: rgba(231,76,60,0.6); }

/* 自定义时间弹窗 */
.custom-time-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 20;
  display: flex; align-items: center; justify-content: center;
}
.custom-time-dialog {
  background: rgba(30,30,60,0.98); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 24px; width: 260px; text-align: center;
}
.custom-time-dialog h4 { font-size: 15px; font-weight: 500; margin-bottom: 16px; opacity: 0.9; }
.custom-time-input-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 16px; }
.custom-time-input-row input {
  width: 60px; padding: 8px; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff;
  font-size: 20px; text-align: center; outline: none;
}
.custom-time-input-row input:focus { border-color: rgba(231,76,60,0.6); }
.custom-time-input-row span { font-size: 20px; opacity: 0.5; }
.custom-time-actions { display: flex; gap: 8px; justify-content: center; }
.custom-time-actions button {
  padding: 8px 20px; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff;
  font-size: 13px; cursor: pointer; transition: background 0.2s;
}
.custom-time-actions button:hover { background: rgba(255,255,255,0.15); }
.custom-time-actions button.confirm { background: rgba(231,76,60,0.4); border-color: rgba(231,76,60,0.5); }
.custom-time-actions button.confirm:hover { background: rgba(231,76,60,0.6); }
</style>
</head>
<body>
<div class="container">
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="work">专注</button>
    <button class="mode-tab" data-mode="shortBreak">短休息</button>
    <button class="mode-tab" data-mode="longBreak">长休息</button>
  </div>
  <div class="timer-section">
    <div class="progress-ring-container" id="progressRingContainer">
      <svg class="progress-ring" width="200" height="200">
        <circle class="progress-ring-bg" cx="100" cy="100" r="90"></circle>
        <circle class="progress-ring-fill" cx="100" cy="100" r="90"></circle>
      </svg>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="edit-hint">点击编辑时间</div>
    </div>
    <div class="cycle-info" id="cycleInfo">第 1 / 4 个番茄</div>
  </div>
  <div class="controls">
    <button class="btn btn-start" id="btnStart">开始</button>
    <button class="btn btn-pause hidden" id="btnPause">暂停</button>
    <button class="btn btn-reset" id="btnReset">重置</button>
    <button class="btn btn-skip" id="btnSkip">跳过</button>
  </div>
  <div class="stats">
    <div class="stat-item"><span class="stat-value" id="todayCount">0</span><span class="stat-label">今日完成</span></div>
    <div class="stat-item"><span class="stat-value" id="totalCount">0</span><span class="stat-label">总计完成</span></div>
    <div class="stat-item"><span class="stat-value" id="totalMinutes">0</span><span class="stat-label">总分钟数</span></div>
  </div>
  <button class="btn-settings" id="btnSettings">⚙️ 设置</button>
</div>

<!-- 自定义时间弹窗 -->
<div class="custom-time-overlay hidden" id="customTimeOverlay">
  <div class="custom-time-dialog">
    <h4>设置倒计时</h4>
    <div class="custom-time-input-row">
      <input type="number" id="customMins" min="1" max="180" value="25"> 分
      <input type="number" id="customSecs" min="0" max="59" value="0"> 秒
    </div>
    <div class="custom-time-actions">
      <button id="btnCancelTime">取消</button>
      <button id="btnConfirmTime" class="confirm">确定</button>
    </div>
  </div>
</div>

<!-- 设置面板 -->
<div class="settings-panel hidden" id="settingsPanel">
  <div class="settings-inner">
    <div class="settings-header">
      <h3>设置</h3>
      <button class="settings-close" id="btnCloseSettings">×</button>
    </div>
    <div class="setting-group"><label>专注时长（分钟）</label><input type="number" id="workDuration" min="1" max="120" value="25"></div>
    <div class="setting-group"><label>短休息（分钟）</label><input type="number" id="shortBreakDuration" min="1" max="30" value="5"></div>
    <div class="setting-group"><label>长休息（分钟）</label><input type="number" id="longBreakDuration" min="1" max="60" value="15"></div>
    <div class="setting-group"><label>长休息间隔（番茄数）</label><input type="number" id="cyclesBeforeLongBreak" min="2" max="10" value="4"></div>
    <div class="setting-group checkbox-label"><input type="checkbox" id="playSound" checked><span>提示音提醒</span></div>
    <div class="setting-group checkbox-label"><input type="checkbox" id="autoStartBreak" checked><span>自动开始休息</span></div>
    <div class="setting-group checkbox-label"><input type="checkbox" id="autoStartWork" checked><span>自动开始专注</span></div>
    <button class="btn-save" id="btnSaveSettings">保存</button>
  </div>
</div>

<script>
const $ = s => document.querySelector(s), $$ = s => document.querySelectorAll(s);

const state = {
  config: { workDuration: 25, shortBreakDuration: 5, longBreakDuration: 15, cyclesBeforeLongBreak: 4, playSound: true, autoStartBreak: true, autoStartWork: true },
  mode: 'work', remainingSeconds: 25 * 60, totalSeconds: 25 * 60, status: 'idle',
  currentCycle: 1, todayCount: 0, totalCount: 0, totalMinutes: 0, timerInterval: null,
};

const els = {
  timerDisplay: $('#timerDisplay'), cycleInfo: $('#cycleInfo'),
  btnStart: $('#btnStart'), btnPause: $('#btnPause'), btnReset: $('#btnReset'), btnSkip: $('#btnSkip'),
  btnSettings: $('#btnSettings'), settingsPanel: $('#settingsPanel'), btnCloseSettings: $('#btnCloseSettings'),
  progressFill: $('.progress-ring-fill'), progressRingContainer: $('#progressRingContainer'),
  todayCount: $('#todayCount'), totalCount: $('#totalCount'), totalMinutes: $('#totalMinutes'),
  workDuration: $('#workDuration'), shortBreakDuration: $('#shortBreakDuration'),
  longBreakDuration: $('#longBreakDuration'), cyclesBeforeLongBreak: $('#cyclesBeforeLongBreak'),
  playSound: $('#playSound'), autoStartBreak: $('#autoStartBreak'), autoStartWork: $('#autoStartWork'),
  btnSaveSettings: $('#btnSaveSettings'), modeTabs: $$('.mode-tab'),
  customTimeOverlay: $('#customTimeOverlay'), customMins: $('#customMins'), customSecs: $('#customSecs'),
  btnCancelTime: $('#btnCancelTime'), btnConfirmTime: $('#btnConfirmTime'),
};

// 加载数据
(function loadData() {
  try {
    const cfg = JSON.parse(localStorage.getItem('tomato-config') || '{}');
    Object.assign(state.config, cfg);
    const stats = JSON.parse(localStorage.getItem('tomato-stats') || '{}');
    const today = new Date().toISOString().slice(0, 10);
    if (stats.lastDate && stats.lastDate !== today) state.todayCount = 0;
    else state.todayCount = stats.todayCount || 0;
    state.totalCount = stats.totalCount || 0;
    state.totalMinutes = stats.totalMinutes || 0;
  } catch(e) {}
})();

function setMode(mode) {
  state.mode = mode;
  els.modeTabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  const dur = { work: state.config.workDuration, shortBreak: state.config.shortBreakDuration, longBreak: state.config.longBreakDuration }[mode];
  state.remainingSeconds = dur * 60;
  state.totalSeconds = dur * 60;
  els.progressFill.className = 'progress-ring-fill' + (mode === 'shortBreak' ? ' break-short' : mode === 'longBreak' ? ' break-long' : '');
  updateDisplay(); updateCycleInfo();
}

function updateDisplay() {
  const m = String(Math.floor(state.remainingSeconds / 60)).padStart(2, '0');
  const s = String(state.remainingSeconds % 60).padStart(2, '0');
  els.timerDisplay.textContent = m + ':' + s;
  document.title = m + ':' + s + ' | 小番茄闹钟';
  const c = 2 * Math.PI * 90;
  els.progressFill.style.strokeDasharray = c;
  els.progressFill.style.strokeDashoffset = c * (1 - state.remainingSeconds / state.totalSeconds);
}

function updateCycleInfo() {
  els.cycleInfo.textContent = state.mode === 'work'
    ? `第 ${state.currentCycle} / ${state.config.cyclesBeforeLongBreak} 个番茄`
    : (state.mode === 'shortBreak' ? '短休息' : '长休息');
}

function startTimer() {
  if (state.status === 'running') return;
  state.status = 'running';
  els.btnStart.classList.add('hidden');
  els.btnPause.classList.remove('hidden');
  state.timerInterval = setInterval(() => {
    state.remainingSeconds--;
    if (state.remainingSeconds <= 0) { clearInterval(state.timerInterval); state.timerInterval = null; state.status = 'idle'; onComplete(); return; }
    updateDisplay();
  }, 1000);
}

function pauseTimer() {
  clearInterval(state.timerInterval); state.timerInterval = null; state.status = 'paused';
  els.btnPause.classList.add('hidden'); els.btnStart.classList.remove('hidden'); els.btnStart.textContent = '继续';
}

function resetTimer() {
  clearInterval(state.timerInterval); state.timerInterval = null; state.status = 'idle';
  const dur = { work: state.config.workDuration, shortBreak: state.config.shortBreakDuration, longBreak: state.config.longBreakDuration }[state.mode];
  state.remainingSeconds = dur * 60; state.totalSeconds = dur * 60; updateDisplay();
  els.btnPause.classList.add('hidden'); els.btnStart.classList.remove('hidden'); els.btnStart.textContent = '开始';
}

function skipTimer() {
  clearInterval(state.timerInterval); state.timerInterval = null; state.status = 'idle'; onComplete();
}

function onComplete() {
  if (state.config.playSound) playSound();
  try { new Notification('小番茄闹钟', { body: state.mode === 'work' ? '专注完成！休息一下吧 🎉' : '休息结束 💪' }); } catch(e) {}
  if (state.mode === 'work') {
    state.todayCount++; state.totalCount++; state.totalMinutes += state.config.workDuration; saveStats();
    if (state.currentCycle >= state.config.cyclesBeforeLongBreak) { state.currentCycle = 1; setMode('longBreak'); state.config.autoStartBreak && setTimeout(startTimer, 500); }
    else { state.currentCycle++; setMode('shortBreak'); state.config.autoStartBreak && setTimeout(startTimer, 500); }
  } else { setMode('work'); state.config.autoStartWork && setTimeout(startTimer, 500); }
  els.btnPause.classList.add('hidden'); els.btnStart.classList.remove('hidden'); els.btnStart.textContent = '开始';
}

function playSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const beep = (t, f) => { const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value = f; o.type = 'sine'; g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.3); o.start(t); o.stop(t + 0.3); };
    const n = ctx.currentTime; beep(n, 880); beep(n + 0.4, 880); beep(n + 0.8, 1100);
  } catch(e) {}
}

function saveStats() {
  localStorage.setItem('tomato-stats', JSON.stringify({ lastDate: new Date().toISOString().slice(0,10), todayCount: state.todayCount, totalCount: state.totalCount, totalMinutes: state.totalMinutes }));
  els.todayCount.textContent = state.todayCount;
  els.totalCount.textContent = state.totalCount;
  els.totalMinutes.textContent = state.totalMinutes;
}

// 事件
els.btnStart.addEventListener('click', () => { state.status === 'paused' && (els.btnStart.textContent = '继续'); startTimer(); });
els.btnPause.addEventListener('click', pauseTimer);
els.btnReset.addEventListener('click', resetTimer);
els.btnSkip.addEventListener('click', skipTimer);
els.modeTabs.forEach(t => t.addEventListener('click', () => { if (state.status !== 'running') setMode(t.dataset.mode); }));

els.btnSettings.addEventListener('click', () => {
  els.workDuration.value = state.config.workDuration;
  els.shortBreakDuration.value = state.config.shortBreakDuration;
  els.longBreakDuration.value = state.config.longBreakDuration;
  els.cyclesBeforeLongBreak.value = state.config.cyclesBeforeLongBreak;
  els.playSound.checked = state.config.playSound;
  els.autoStartBreak.checked = state.config.autoStartBreak;
  els.autoStartWork.checked = state.config.autoStartWork;
  els.settingsPanel.classList.remove('hidden');
});
els.btnCloseSettings.addEventListener('click', () => els.settingsPanel.classList.add('hidden'));
els.btnSaveSettings.addEventListener('click', () => {
  state.config.workDuration = parseInt(els.workDuration.value) || 25;
  state.config.shortBreakDuration = parseInt(els.shortBreakDuration.value) || 5;
  state.config.longBreakDuration = parseInt(els.longBreakDuration.value) || 15;
  state.config.cyclesBeforeLongBreak = parseInt(els.cyclesBeforeLongBreak.value) || 4;
  state.config.playSound = els.playSound.checked;
  state.config.autoStartBreak = els.autoStartBreak.checked;
  state.config.autoStartWork = els.autoStartWork.checked;
  localStorage.setItem('tomato-config', JSON.stringify(state.config));
  state.status !== 'running' && setMode(state.mode);
  els.settingsPanel.classList.add('hidden');
});

els.progressRingContainer.addEventListener('click', () => {
  if (state.status === 'running') return;
  els.customMins.value = Math.floor(state.remainingSeconds / 60) || 25;
  els.customSecs.value = state.remainingSeconds % 60;
  els.customTimeOverlay.classList.remove('hidden');
  els.customMins.focus(); els.customMins.select();
});
els.btnCancelTime.addEventListener('click', () => els.customTimeOverlay.classList.add('hidden'));
els.btnConfirmTime.addEventListener('click', () => {
  const total = (parseInt(els.customMins.value) || 0) * 60 + (parseInt(els.customSecs.value) || 0);
  if (total > 0 && total <= 180 * 60) { state.remainingSeconds = total; state.totalSeconds = total; updateDisplay(); }
  els.customTimeOverlay.classList.add('hidden');
});
els.customTimeOverlay.addEventListener('keydown', e => { if (e.key === 'Enter') els.btnConfirmTime.click(); if (e.key === 'Escape') els.btnCancelTime.click(); });

// 初始化
updateDisplay(); updateCycleInfo();
</script>
</body>
</html>
