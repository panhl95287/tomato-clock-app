<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小番茄闹钟</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 窗口拖拽区域 -->
  <div class="titlebar" id="titlebar">
    <span class="titlebar-title">🍅 小番茄闹钟</span>
    <div class="titlebar-buttons">
      <button class="titlebar-btn minimize-btn" id="btnMinimize" title="最小化">−</button>
      <button class="titlebar-btn close-btn" id="btnClose" title="关闭">×</button>
    </div>
  </div>

  <!-- 主容器 -->
  <div class="container">
    <!-- 模式标签切换 -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="work">专注</button>
      <button class="mode-tab" data-mode="shortBreak">短休息</button>
      <button class="mode-tab" data-mode="longBreak">长休息</button>
    </div>

    <!-- 番茄计时器 -->
    <div class="timer-section">
      <div class="progress-ring-container" id="progressRingContainer">
        <svg class="progress-ring" width="200" height="200">
          <circle class="progress-ring-bg" cx="100" cy="100" r="90"></circle>
          <circle class="progress-ring-fill" cx="100" cy="100" r="90"></circle>
        </svg>
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="edit-hint">点击编辑时间</div>
      </div>
      <div class="cycle-info" id="cycleInfo">第 1 / 4 个番茄</div>
    </div>

    <!-- 控制按钮 -->
    <div class="controls">
      <button class="btn btn-start" id="btnStart">开始</button>
      <button class="btn btn-pause hidden" id="btnPause">暂停</button>
      <button class="btn btn-reset" id="btnReset">重置</button>
      <button class="btn btn-skip" id="btnSkip">跳过</button>
    </div>

    <!-- 统计 -->
    <div class="stats">
      <div class="stat-item">
        <span class="stat-value" id="todayCount">0</span>
        <span class="stat-label">今日完成</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="totalCount">0</span>
        <span class="stat-label">总计完成</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="totalMinutes">0</span>
        <span class="stat-label">总分钟数</span>
      </div>
    </div>

    <!-- 设置按钮 -->
    <button class="btn-settings" id="btnSettings">⚙️ 设置</button>

    <!-- 自定义时间弹窗 -->
    <div class="custom-time-overlay hidden" id="customTimeOverlay">
      <div class="custom-time-dialog">
        <h4>设置倒计时</h4>
        <div class="custom-time-input-row">
          <input type="number" id="customMins" min="1" max="180" value="25">
          <span>分</span>
          <input type="number" id="customSecs" min="0" max="59" value="0">
          <span>秒</span>
        </div>
        <div class="custom-time-actions">
          <button id="btnCancelTime">取消</button>
          <button id="btnConfirmTime" class="confirm">确定</button>
        </div>
      </div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-panel hidden" id="settingsPanel">
      <div class="settings-header">
        <h3>设置</h3>
        <button class="settings-close" id="btnCloseSettings">×</button>
      </div>
      <div class="settings-body">
        <div class="setting-group">
          <label>专注时长（分钟）</label>
          <input type="number" id="workDuration" min="1" max="120" value="25">
        </div>
        <div class="setting-group">
          <label>短休息（分钟）</label>
          <input type="number" id="shortBreakDuration" min="1" max="30" value="5">
        </div>
        <div class="setting-group">
          <label>长休息（分钟）</label>
          <input type="number" id="longBreakDuration" min="1" max="60" value="15">
        </div>
        <div class="setting-group">
          <label>长休息间隔（番茄数）</label>
          <input type="number" id="cyclesBeforeLongBreak" min="2" max="10" value="4">
        </div>
        <div class="setting-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="playSound" checked>
            <span>提示音提醒</span>
          </label>
        </div>
        <div class="setting-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="autoStartBreak" checked>
            <span>自动开始休息</span>
          </label>
        </div>
        <div class="setting-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="autoStartWork" checked>
            <span>自动开始专注</span>
          </label>
        </div>
        <button class="btn btn-save" id="btnSaveSettings">保存</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
